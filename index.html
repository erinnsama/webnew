<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EMO Blast! - Moodbased Roguelike Survival</title>
  <style>
    /* =============================================
       位置調整區 — 改這裡就能移動各元素
       數字越大 = 離頂部越遠（越往下）
       ============================================= */
    :root {
      /* ── 位置 ── */
      --logo-top:      -1%;   /* Logo 上下位置 */
      --slogan-top:    63%;   /* Slogan 上下位置 */
      --buttons-top:   68%;   /* 下載按鈕上下位置 */
      --social-bottom:  3%;   /* 社群圖示離底部距離 */

      /* ── 尺寸 ── */
      --logo-size:     300px; /* Logo 大小 */
      --slogan-size:   2rem;  /* Slogan 字體大小 */
      --buttons-size:  97px;  /* 下載按鈕高度 */
      --social-size:   49px;  /* 社群圖示大小 */
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Arial', sans-serif;
      background-color: #0d0620;
      color: #fff;
      overflow-x: hidden;
    }

    /* ── Hero Section ── */
    .hero {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
    }

    .hero-bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      z-index: 0;
    }

    .hero-bg-pc     { display: block; }
    .hero-bg-mobile { display: none; }

    @media (max-width: 768px) {
      .hero-bg-pc     { display: none; }
      .hero-bg-mobile { display: block; }

      :root {
        --logo-top:      2%;
        --slogan-top:    62%;
        --buttons-top:   65.5%;
        --logo-size:     230px;
        --slogan-size:   1.1rem;
        --buttons-size:  61px;
      }

      .slogan {
        -webkit-text-stroke: 2px #ffffff;
      }

      .slogan-l1, .slogan-l2 { display: block; }
      .slogan-l1 { position: relative; top: -5%; }
      .slogan-l2 { position: relative; top: -2%; }

      .buttons-wrapper {
        width: 90vw;
      }

      .download-buttons {
        flex-wrap: nowrap;
        gap: 10px;
      }
    }

    .hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(13, 6, 32, 0)    0%,
        rgba(13, 6, 32, 0)   67%,
        rgba(13, 6, 32, 0.3) 85%,
        rgba(13, 6, 32, 0.95) 97%,
        rgba(13, 6, 32, 1)  100%
      );
      z-index: 1;
    }

    /* ── Logo ── */
    .logo-wrapper {
      position: absolute;
      top: var(--logo-top);
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
      text-align: center;
    }

    .game-logo {
      width: var(--logo-size);
      max-width: 75vw;
      filter: drop-shadow(0 0 32px rgba(168, 85, 247, 0.7));
      animation: float 3.5s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-10px); }
    }

    /* ── Slogan ── */
    .slogan-wrapper {
      position: absolute;
      top: var(--slogan-top);
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
      text-align: center;
      width: 100%;
    }

    .slogan {
      font-size: var(--slogan-size);
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #2d0052;                     /* 深紫色字 */
      -webkit-text-stroke: 5px #ffffff;   /* 白色外框 */
      paint-order: stroke fill;
      text-shadow:
        2px  5px  8px rgba(0, 0, 0, 0.85), /* 右下陰影 */
        0  0   20px rgba(80, 0, 180, 0.3); /* 淡紫光暈 */
    }

    /* ── Download Buttons ── */
    .buttons-wrapper {
      position: absolute;
      top: var(--buttons-top);
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
    }

    .download-buttons {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .download-btn {
      display: block;
      transition: transform 0.2s ease, filter 0.2s ease;
    }

    .download-btn:hover {
      transform: translateY(-4px);
      filter: brightness(1.15) drop-shadow(0 8px 20px rgba(168, 85, 247, 0.55));
    }

    .download-btn img {
      height: var(--buttons-size);
      width: auto;
    }

    /* ── Social Icons ── */
    .social-wrapper {
      position: absolute;
      bottom: var(--social-bottom);
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
    }

    .social-section {
      display: flex;
      gap: 20px;
    }

    .social-link {
      display: flex;
      align-items: center;
      justify-content: center;
      width: var(--social-size);
      height: var(--social-size);
      border-radius: 50%;
      background: rgba(139, 92, 246, 0.18);
      border: 1px solid rgba(168, 85, 247, 0.45);
      color: #fff;
      text-decoration: none;
      transition: background 0.2s, border-color 0.2s, transform 0.2s;
    }

    .social-link:hover {
      background: rgba(168, 85, 247, 0.45);
      border-color: rgba(168, 85, 247, 0.85);
      transform: translateY(-3px);
    }

    .social-link svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
    }

    /* ── Footer ── */
    footer {
      background: #0d0620;
      text-align: center;
      padding: 18px 20px;
      color: rgba(255, 255, 255, 0.3);
      font-size: 0.75rem;
      letter-spacing: 0.05em;
    }
  </style>
</head>
